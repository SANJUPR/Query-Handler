<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Vault Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-bg: #1e293b;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --code-bg: #0b0f19;
            --code-text: #e2e8f0;
            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .main-content {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Top Bar Layout */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            gap: 1.5rem;
            background: var(--surface-bg);
            padding: 1.25rem 1.75rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.3);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 480px;
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        .search-bar {
            width: 100%;
            padding: 0.8rem 1.25rem 0.8rem 3rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            background: var(--code-bg);
            color: var(--text-main);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-bar::placeholder {
            color: #64748b;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .actions-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover { 
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #334155;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { 
            background: #475569; 
        }

        .btn-icon {
            padding: 0.8rem;
            border-radius: 12px;
            background: var(--code-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            color: var(--text-main);
            background: #334155;
            border-color: #475569;
        }

        /* Grid Layout - Optimized for 5 columns on large screens */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
        }

        @media (min-width: 1400px) {
            .dashboard-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .query-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .query-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .query-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -4px rgba(0, 0, 0, 0.4);
            border-color: #475569;
        }

        .query-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-icon-container {
            padding: 0.5rem;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .query-preview {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.85rem;
            border-radius: 12px;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            height: 110px; 
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Custom Scrollbar for Pre blocks */
        .query-preview::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .query-preview::-webkit-scrollbar-track {
            background: transparent;
        }
        .query-preview::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        .query-preview::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            border-top: 1px solid var(--border);
            padding-top: 0.85rem;
            margin-top: auto;
        }

        .card-footer .btn-icon {
            padding: 0.5rem;
            border-radius: 8px;
        }

        /* Modal Layout */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background: var(--surface-bg);
            width: 100%;
            max-width: 550px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem 1.75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 1.75rem;
        }

        .modal-footer {
            padding: 1.25rem 1.75rem;
            background: #131c2e;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        textarea.form-control {
            min-height: 160px;
            resize: vertical;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
            background: var(--surface-bg);
            border: 2px dashed var(--border);
            border-radius: 20px;
        }

        /* Toast Popup Alerts */
        .toast {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            background: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.85rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            border: 1px solid var(--border);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .top-bar { flex-direction: column; align-items: stretch; gap: 1rem; padding: 1rem; }
            .search-wrapper { max-width: 100%; }
            .actions-wrapper { justify-content: flex-end; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .toast { left: 1rem; right: 1rem; bottom: 1rem; }
        }
    </style>
</head>
<body>

    <main class="main-content">
        <div class="top-bar">
            <div class="search-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="searchBar" class="search-bar" placeholder="Search saved queries..." oninput="filterQueries()">
            </div>
            <div class="actions-wrapper">
                <button class="btn btn-primary" onclick="openModal()">
                    <i data-lucide="plus" style="width:18px;height:18px;"></i> Add New Query
                </button>
                <button class="btn-icon" title="GitHub Sync Settings" onclick="openSettingsModal()">
                    <i data-lucide="settings" style="width:20px;height:20px;"></i>
                </button>
            </div>
        </div>

        <div id="dashboardGrid" class="dashboard-grid"></div>
    </main>

    <!-- Modal Form Overlay (Add/Edit) -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModalOnOverlay(event, 'modalOverlay')">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle" style="font-size: 1.25rem; font-weight: 600;">Add New Query</h3>
                <button class="btn-icon" style="border:none; background:transparent; cursor:pointer;" onclick="closeModal('modalOverlay')">
                    <i data-lucide="x" style="width:20px;height:20px;"></i>
                </button>
            </div>
            <form id="queryForm" onsubmit="handleFormSubmit(event)">
                <div class="modal-body">
                    <input type="hidden" id="queryId">
                    <div class="form-group">
                        <label for="queryHeading">Query Heading / Name</label>
                        <input type="text" id="queryHeading" class="form-control" placeholder="e.g., Fetch Weekly Active Users" required>
                    </div>
                    <div class="form-group">
                        <label for="queryText">Query Description / Code Snippet</label>
                        <textarea id="queryText" class="form-control" placeholder="SELECT * FROM users..." required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modalOverlay')">Cancel</button>
                    <button type="submit" id="saveBtn" class="btn btn-primary">Save Query</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal Overlay -->
    <div id="settingsOverlay" class="modal-overlay" onclick="closeModalOnOverlay(event, 'settingsOverlay')">
        <div class="modal-container">
            <div class="modal-header">
                <h3 style="font-size: 1.25rem; font-weight: 600;">GitHub Integration Settings</h3>
                <button class="btn-icon" style="border:none; background:transparent; cursor:pointer;" onclick="closeModal('settingsOverlay')">
                    <i data-lucide="x" style="width:20px;height:20px;"></i>
                </button>
            </div>
            <form id="settingsForm" onsubmit="saveSettings(event)">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="ghToken">GitHub Personal Access Token (PAT)</label>
                        <input type="password" id="ghToken" class="form-control" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" required>
                    </div>
                    <div class="form-group">
                        <label for="ghOwner">GitHub Username / Owner</label>
                        <input type="text" id="ghOwner" class="form-control" placeholder="e.g., sanju-developer" required>
                    </div>
                    <div class="form-group">
                        <label for="ghRepo">Repository Name</label>
                        <input type="text" id="ghRepo" class="form-control" placeholder="e.g., query-vault" required>
                    </div>
                    <div class="form-group">
                        <label for="ghBranch">Branch Name</label>
                        <input type="text" id="ghBranch" class="form-control" value="main" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('settingsOverlay')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Dynamic Alert Toast System -->
    <div id="toast" class="toast">
        <span id="toastIconSlot"><i data-lucide="loader" class="spinning" style="width:18px;height:18px;color:#6366f1;"></i></span>
        <span id="toastMessage">Fetching database...</span>
    </div>

<script>
    let queries = [];
    const csvFileName = "QueryDB.csv"; 

    // DOM Bindings
    const dashboardGrid = document.getElementById('dashboardGrid');
    const modalOverlay = document.getElementById('modalOverlay');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const queryForm = document.getElementById('queryForm');
    const queryIdInput = document.getElementById('queryId');
    const queryHeadingInput = document.getElementById('queryHeading');
    const queryTextInput = document.getElementById('queryText');
    const modalTitle = document.getElementById('modalTitle');
    const saveBtn = document.getElementById('saveBtn');
    const searchBar = document.getElementById('searchBar');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const toastIconSlot = document.getElementById('toastIconSlot');

    // Load elements on initialization
    window.addEventListener('DOMContentLoaded', () => {
        renderDashboard([]);
        showStatusToast("loader", "Fetching database from GitHub...", "#6366f1", true);
        autoFetchCSV();
    });

    /* ==========================================================================
       AUTOMATIC READ FETCH FROM REPO
       ========================================================================== */
    async function autoFetchCSV() {
        try {
            const response = await fetch(`./${csvFileName}?t=${Date.now()}`); 
            if (!response.ok) throw new Error("Missing File");
            
            const text = await response.text();
            queries = parseCSV(text);
            
            showStatusToast("check-circle", `Synced! Loaded ${queries.length} queries.`, "#10b981", false, 2500);
            filterQueries();
        } catch (err) {
            showStatusToast("alert-circle", `Could not read "${csvFileName}". Verify file is in your repository.`, "#f43f5e", false, 5000);
        }
    }

    /* ==========================================================================
       SILENT DIRECT COMMITS VIA GITHUB API
       ========================================================================== */
    async function saveChangesToGitHub() {
        const token = localStorage.getItem('gh_token');
        const owner = localStorage.getItem('gh_owner');
        const repo = localStorage.getItem('gh_repo');
        const branch = localStorage.getItem('gh_branch') || 'main';

        if (!token || !owner || !repo) {
            showStatusToast("settings", "Configure GitHub Settings to enable cloud auto-saving.", "#f59e0b", false, 6000);
            return false;
        }

        // Notification showing background processing has started
        showStatusToast("loader", "Recent change accepted! Committing progress to GitHub background...", "#6366f1", true);

        try {
            const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${csvFileName}?ref=${branch}`;
            const getRes = await fetch(fileUrl, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });

            let sha = "";
            if (getRes.ok) {
                const fileData = await getRes.json();
                sha = fileData.sha;
            }

            let csvContent = "Heading,Query,ID\r\n";
            queries.forEach(q => {
                let headingEscaped = '"' + q.heading.replace(/"/g, '""') + '"';
                let textEscaped = '"' + q.text.replace(/"/g, '""') + '"';
                csvContent += headingEscaped + "," + textEscaped + "," + q.id + "\r\n";
            });

            const putRes = await fetch(fileUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: "Dashboard automatic database updates [skip ci]",
                    content: btoa(unescape(encodeURIComponent(csvContent))), 
                    sha: sha || undefined,
                    branch: branch
                })
            });

            if (!putRes.ok) throw new Error("GitHub push failed");

            showStatusToast("check-circle", "GitHub cloud repository successfully updated!", "#10b981", false, 3000);
            return true;
        } catch (err) {
            showStatusToast("alert-circle", "Background sync failed! Check token or file permissions.", "#f43f5e", false, 5000);
            return false;
        }
    }

    /* ==========================================================================
       DASHBOARD ACTION INTERFACES
       ========================================================================== */
    async function handleFormSubmit(e) {
        e.preventDefault();
        const id = queryIdInput.value;
        const heading = queryHeadingInput.value.trim();
        const text = queryTextInput.value.trim();

        const originalQueries = [...queries];

        // 1. Instant local state updates
        if (id) {
            queries = queries.map(q => q.id === parseInt(id) ? { ...q, heading, text } : q);
        } else {
            const item = { id: Date.now(), heading, text };
            queries.unshift(item);
        }

        closeModal('modalOverlay');
        filterQueries(); // Renders change immediately on dashboard layout
        
        // 2. Trigger asynchronous commit task behind scenes
        const success = await saveChangesToGitHub();
        if (!success) {
            queries = originalQueries; // Rolling back locally if write error triggers
            filterQueries();
        }
    }

    async function destroyQuery(id) {
        if (confirm("Delete this query permanently from your GitHub repository file?")) {
            const originalQueries = [...queries];
            
            // 1. Instantly clear locally
            queries = queries.filter(q => q.id !== id);
            filterQueries();
            
            // 2. Trigger asynchronous background removal
            const success = await saveChangesToGitHub();
            if (!success) {
                queries = originalQueries;
                filterQueries();
            }
        }
    }

    /* ==========================================================================
       SETTINGS MANAGEMENT LAYERS
       ========================================================================== */
    function openSettingsModal() {
        document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        document.getElementById('ghOwner').value = localStorage.getItem('gh_owner') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
        document.getElementById('ghBranch').value = localStorage.getItem('gh_branch') || 'main';
        settingsOverlay.classList.add('active');
    }

    function saveSettings(e) {
        e.preventDefault();
        localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
        localStorage.setItem('gh_owner', document.getElementById('ghOwner').value.trim());
        localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim());
        localStorage.setItem('gh_branch', document.getElementById('ghBranch').value.trim());
        
        closeModal('settingsOverlay');
        showStatusToast("check-circle", "GitHub parameters updated!", "#10b981", false, 2500);
        autoFetchCSV(); 
    }

    /* ==========================================================================
       UI INTERFACES AND VIEWPORTS
       ========================================================================== */
    function showStatusToast(icon, message, color, isSpinning = false, timeout = 0) {
        toastIconSlot.innerHTML = `<i data-lucide="${icon}" class="${isSpinning ? 'spinning' : ''}" style="width:18px;height:18px;color:${color};"></i>`;
        toastMessage.innerText = message;
        lucide.createIcons();
        toast.classList.add('show');
        
        if (timeout > 0) {
            setTimeout(() => toast.classList.remove('show'), timeout);
        }
    }

    function getContextIcon(title) {
        const text = title.toLowerCase();
        if (text.includes('user') || text.includes('customer') || text.includes('profile')) return 'users';
        if (text.includes('sql') || text.includes('db') || text.includes('table') || text.includes('select')) return 'database';
        if (text.includes('graph') || text.includes('chart') || text.includes('analytics')) return 'bar-chart-2';
        if (text.includes('delete') || text.includes('remove') || text.includes('drop')) return 'trash-2';
        if (text.includes('update') || text.includes('patch') || text.includes('edit')) return 'refresh-cw';
        if (text.includes('setting') || text.includes('config')) return 'settings';
        return 'code'; 
    }

    function openModal(isEdit = false) {
        if (!isEdit) {
            queryForm.reset();
            queryIdInput.value = '';
            modalTitle.innerText = "Add New Query";
            saveBtn.innerText = "Save Query";
        }
        modalOverlay.classList.add('active');
    }

    function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }
    function closeModalOnOverlay(e, modalId) { if (e.target === document.getElementById(modalId)) closeModal(modalId); }

    function renderDashboard(dataset) {
        dashboardGrid.innerHTML = '';
        if (dataset.length === 0) {
            dashboardGrid.innerHTML = `
                <div class="no-data">
                    <i data-lucide="folder-open" style="width:40px; height:40px; margin-bottom:1rem; color:var(--text-muted);"></i>
                    <p>No queries found. Verify "${csvFileName}" is committed directly alongside this file inside your repository.</p>
                </div>`;
            lucide.createIcons();
            return;
        }

        dataset.forEach(q => {
            const iconName = getContextIcon(q.heading);
            const card = document.createElement('div');
            card.className = 'query-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon-container"><i data-lucide="${iconName}" style="width:18px; height:18px;"></i></div>
                    <div class="card-title" title="${escapeHTML(q.heading)}">${escapeHTML(q.heading)}</div>
                </div>
                <pre class="query-preview"><code>${escapeHTML(q.text)}</code></pre>
                <div class="card-footer">
                    <button class="btn-icon" title="Copy Content" onclick="copySnippet(\`${escapeJS(q.text)}\`)">
                        <i data-lucide="copy" style="width:16px; height:16px;"></i>
                    </button>
                    <button class="btn-icon" title="Modify Item" onclick="setupEditForm(${q.id})">
                        <i data-lucide="edit-3" style="width:16px; height:16px;"></i>
                    </button>
                    <button class="btn-icon" title="Delete Permanent" onclick="destroyQuery(${q.id})">
                        <i data-lucide="trash" style="width:16px; height:16px;"></i>
                    </button>
                </div>`;
            dashboardGrid.appendChild(card);
        });
        lucide.createIcons();
    }

    function filterQueries() {
        const value = searchBar.value.toLowerCase();
        const output = queries.filter(q => 
            q.heading.toLowerCase().includes(value) || 
            q.text.toLowerCase().includes(value)
        );
        renderDashboard(output);
    }

    function setupEditForm(id) {
        const item = queries.find(q => q.id === id);
        if (!item) return;
        queryIdInput.value = item.id;
        queryHeadingInput.value = item.heading;
        queryTextInput.value = item.text;
        modalTitle.innerText = "Edit Query Settings";
        saveBtn.innerText = "Update Changes";
        openModal(true);
    }

    function copySnippet(val) {
        navigator.clipboard.writeText(val).then(() => {
            showStatusToast("copy", "Copied to clipboard!", "#10b981", false, 2000);
        });
    }

    function parseCSV(text) {
        let lines = []; let row = [""]; let inQuotes = false;
        if (text.trim() === "") return [];
        for (let i = 0; i < text.length; i++) {
            let c = text[i]; let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } 
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) { row.push(''); } 
            else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row); row = [''];
            } else { row[row.length - 1] += c; }
        }
        if (row.length > 1 || row[0] !== '') lines.push(row);
        if (lines.length <= 1) return [];
        
        const headers = lines[0].map(h => h.trim().toLowerCase());
        const headingIdx = headers.indexOf('heading');
        const textIdx = headers.indexOf('query') !== -1 ? headers.indexOf('query') : headers.indexOf('description');
        const idIdx = headers.indexOf('id');

        if (headingIdx === -1 || textIdx === -1) {
            return lines.slice(1).filter(r => r.length >= 2).map((r, index) => ({
                id: r[2] ? parseInt(r[2]) : Date.now() + index,
                heading: r[0] || 'Untitled',
                text: r[1] || ''
            }));
        }
        return lines.slice(1).filter(r => r.length > Math.max(headingIdx, textIdx)).map((r, index) => ({
            id: idIdx !== -1 && r[idIdx] ? parseInt(r[idIdx]) : Date.now() + index,
            heading: r[headingIdx] || 'Untitled',
            text: r[textIdx] || ''
        }));
    }

    document.addEventListener("DOMContentLoaded", function() {
        if (window.lucide) {
            window.lucide.createIcons();
        }
    });

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[m]));
    }
    function escapeJS(str) {
        return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');
    }
</script>
</body>
</html>
